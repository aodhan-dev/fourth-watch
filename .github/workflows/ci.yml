name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run validate:data
      - run: npm run test:unit
      - name: Production build (adapter-cloudflare)
        run: npm run build
      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run inside Microsoft's official Playwright image so the browsers are
    # pre-installed (matching the pinned @playwright/test version). This avoids
    # the runtime `playwright install` download from cdn.playwright.dev, which
    # was deterministically stalling at 100% and hanging the job.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Build for e2e (adapter-static)
        run: node scripts/build-e2e.js
      - run: npm run test:e2e
